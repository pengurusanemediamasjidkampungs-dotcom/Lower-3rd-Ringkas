<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Thirds Source - Pro Edition (Combined)</title>
    <!-- Path CSS pastikan betul -->
    <link rel="stylesheet" href="common/css/style-source.css">
    <script src="common/js/jquery.js"></script>
</head>
<body class="browser-source lower-thirds">

    <div id="container">
        <!-- Lower third 1 -->
        <div id="lower-third-1" class="alt left style-1 hide-anim">
            <div id="alt-1-logo" class="logo no-logo">
                <img id="alt-1-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-1-name"></div></div>
                <div class="text-mask"><div id="alt-1-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Lower third 2 -->
        <div id="lower-third-2" class="alt left style-1 hide-anim">
            <div id="alt-2-logo" class="logo no-logo">
                <img id="alt-2-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-2-name"></div></div>
                <div class="text-mask"><div id="alt-2-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Lower third 3 -->
        <div id="lower-third-3" class="alt left style-1 hide-anim">
            <div id="alt-3-logo" class="logo no-logo">
                <img id="alt-3-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-3-name"></div></div>
                <div class="text-mask"><div id="alt-3-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Lower third 4 -->
        <div id="lower-third-4" class="alt left style-1 hide-anim">
            <div id="alt-4-logo" class="logo no-logo">
                <img id="alt-4-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-4-name"></div></div>
                <div class="text-mask"><div id="alt-4-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>
    </div>

    <script type="text/javascript">
        // Saluran komunikasi (Kekalkan kedua-duanya untuk kompatibiliti penuh)
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');
        const bcf = new BroadcastChannel('obs-lower-thirds-fonts');

        // Fungsi Animasi Masuk
        function animationIn(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("hide-anim", "animation-out");
            void el.offsetWidth; // Trigger reflow
            el.classList.add("animation-in");
        }

        // Fungsi Animasi Keluar
        function animationOut(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("animation-in");
            void el.offsetWidth;
            el.classList.add("animation-out");
        }

        // 1. MENDENGAR PERUBAHAN DATA (BCP)
        bcp.onmessage = function (ev) {
            const data = ev.data;
            let root = document.documentElement;

            // FUNGSI FONT DINAMIK (Dari Versi Pro)
            if (data.font_data) {
                let fontStyle = document.getElementById('dynamic-font-style');
                if (!fontStyle) {
                    fontStyle = document.createElement('style');
                    fontStyle.id = 'dynamic-font-style';
                    document.head.appendChild(fontStyle);
                }
                fontStyle.innerHTML = `
                    @font-face {
                        font-family: 'CustomUserFont';
                        src: url('${data.font_data}');
                    }
                    body, .alt { 
                        font-family: 'CustomUserFont', sans-serif !important; 
                    }
                `;
            }

            // KEMASKINI SAIZ FONT GLOBAL
            if (data.font_size) {
                root.style.setProperty('--global-font-size', data.font_size + "px");
            }

            for (let i = 1; i <= 4; i++) {
                // Kemaskini Teks
                const nameEl = document.getElementById(`alt-${i}-name`);
                const infoEl = document.getElementById(`alt-${i}-info`);
                if (nameEl) nameEl.innerHTML = data[`alt_${i}_name`] || "";
                if (infoEl) infoEl.innerHTML = data[`alt_${i}_info`] || "";

                // Kemaskini Warna & Variabel Gaya (Kekalkan fungsi asal)
                root.style.setProperty(`--alt-${i}-name-color`, data[`alt_${i}_name_color`]);
                root.style.setProperty(`--alt-${i}-info-color`, data[`alt_${i}_info_color`]);
                root.style.setProperty(`--alt-${i}-style-color-1`, data[`alt_${i}_style_color_1`]);
                root.style.setProperty(`--alt-${i}-style-color-2`, data[`alt_${i}_style_color_2`]);
                
                // Saiz individu jika ada
                if (data[`alt_${i}_size`]){
                    root.style.setProperty(`--alt-${i}-size`, data[`alt_${i}_size`] + "px");
                }

                // Kemaskini Kedudukan & Gaya
                const ltContainer = document.getElementById(`lower-third-${i}`);
                if (ltContainer) {
                    ltContainer.className = `alt ${data[`alt_${i}_align`]} style-${data[`alt_${i}_style`]}`;
                    
                    if (data[`alt_${i}_switch`] === "false" && !ltContainer.classList.contains('animation-out')) {
                        ltContainer.classList.add("hide-anim");
                    }
                }

                // Logik Logo
                const logoImg = document.getElementById(`alt-${i}-logo-image`);
                const logoDiv = document.getElementById(`alt-${i}-logo`);
                if (logoImg && logoDiv) {
                    if (data[`alt_${i}_logo_switch`] === "true" && data[`alt_${i}_logo_image`]) {
                        logoDiv.classList.remove("no-logo");
                        logoImg.src = data[`alt_${i}_logo_image`];
                    } else {
                        logoDiv.classList.add("no-logo");
                        logoImg.src = "//:0";
                    }
                }

                // Trigger Animasi
                if (data[`alt_${i}_switch`] === "true") {
                    animationIn(`lower-third-${i}`);
                } else {
                    animationOut(`lower-third-${i}`);
                }
            }
        };

        // 2. MENDENGAR FONT DARI SALURAN KHAS (BCF - Kekalkan fungsi asal)
        bcf.onmessage = function (ev) {
            if (ev.data && ev.data.new_font_to_send) {
                $('head').append('<style>' + ev.data.new_font_to_send + '</style>');
            }
        };

    </script>
</body>
</html>
