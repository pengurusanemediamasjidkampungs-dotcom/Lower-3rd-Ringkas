<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Thirds Source - Pro Edition (Updated)</title>
    <!-- Path CSS -->
    <link rel="stylesheet" href="common/css/style-source.css">
    <script src="common/js/jquery.js"></script>
    <style>
        /* Variabel Asas & Transition */
        :root {
            --anim-speed: 0.6s;
            --global-font-size: 18px;
        }

        .animation-in, .animation-out {
            transition: all var(--anim-speed) ease-in-out;
        }

        /* Placeholder untuk jenis transisi jika belum ada dalam CSS luar */
        .type-fade.animation-in { opacity: 1; }
        .type-fade.animation-out { opacity: 0; }
        
        .type-slide.animation-in { transform: translateX(0); opacity: 1; }
        .type-slide.animation-out { transform: translateX(-100%); opacity: 0; }

        .type-fly.animation-in { transform: translateY(0); opacity: 1; }
        .type-fly.animation-out { transform: translateY(50px); opacity: 0; }
    </style>
</head>
<body class="browser-source lower-thirds">

    <div id="container">
        <!-- Lower third 1-4 (Struktur dikekalkan) -->
        <div id="lower-third-1" class="alt left style-1 hide-anim">
            <div id="alt-1-logo" class="logo no-logo">
                <img id="alt-1-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-1-name"></div></div>
                <div class="text-mask"><div id="alt-1-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <div id="lower-third-2" class="alt left style-1 hide-anim">
            <div id="alt-2-logo" class="logo no-logo">
                <img id="alt-2-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-2-name"></div></div>
                <div class="text-mask"><div id="alt-2-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <div id="lower-third-3" class="alt left style-1 hide-anim">
            <div id="alt-3-logo" class="logo no-logo">
                <img id="alt-3-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-3-name"></div></div>
                <div class="text-mask"><div id="alt-3-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <div id="lower-third-4" class="alt left style-1 hide-anim">
            <div id="alt-4-logo" class="logo no-logo">
                <img id="alt-4-logo-image" src="//:0" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-4-name"></div></div>
                <div class="text-mask"><div id="alt-4-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>
    </div>

    <script type="text/javascript">
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');
        const bcf = new BroadcastChannel('obs-lower-thirds-fonts');

        let loopTimers = {};

        // --- FUNGSI ANIMASI ---
        function animationIn(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("hide-anim", "animation-out");
            void el.offsetWidth; 
            el.classList.add("animation-in");
        }

        function animationOut(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("animation-in");
            void el.offsetWidth;
            el.classList.add("animation-out");
        }

        // --- SISTEM LOOP ---
        function runLoopSystem(index, activeDur, idleDur) {
            const ltId = `lower-third-${index}`;
            if (loopTimers[ltId]) clearTimeout(loopTimers[ltId]);

            function cycle() {
                animationIn(ltId);
                loopTimers[ltId] = setTimeout(() => {
                    animationOut(ltId);
                    loopTimers[ltId] = setTimeout(() => {
                        cycle();
                    }, parseInt(idleDur));
                }, parseInt(activeDur));
            }
            cycle();
        }

        // --- 1. MENDENGAR DATA (BCP) ---
        bcp.onmessage = function (ev) {
            const data = ev.data;
            let root = document.documentElement;

            // LOGIK RESET (Fungsi Baru)
            if (data.action === 'reset') {
                for(let i=1; i<=4; i++) {
                    const ltId = `lower-third-${i}`;
                    if (loopTimers[ltId]) clearTimeout(loopTimers[ltId]);
                    document.getElementById(`alt-${i}-logo-image`).src = "//:0";
                    animationOut(ltId);
                }
                return;
            }

            // GLOBAL SETTINGS
            if (data.anim_speed) root.style.setProperty('--anim-speed', data.anim_speed + "s");
            if (data.font_size) root.style.setProperty('--global-font-size', data.font_size + "px");

            // TRANSITION TYPE (Fungsi Baru: slide, fade, fly)
            const typeClass = `type-${data.transition_type || 'slide'}`;

            // FONT DINAMIK
            if (data.font_data) {
                let fontStyle = document.getElementById('dynamic-font-style');
                if (!fontStyle) {
                    fontStyle = document.createElement('style');
                    fontStyle.id = 'dynamic-font-style';
                    document.head.appendChild(fontStyle);
                }
                fontStyle.innerHTML = `@font-face { font-family: 'CustomUserFont'; src: url('${data.font_data}'); } body, .alt { font-family: 'CustomUserFont', sans-serif !important; }`;
            }

            // LOOP SETIAP LOWER THIRD
            for (let i = 1; i <= 4; i++) {
                const ltId = `lower-third-${i}`;
                const ltContainer = document.getElementById(ltId);
                if (!ltContainer) continue;

                // Stop timer sedia ada sebelum update
                if (loopTimers[ltId]) clearTimeout(loopTimers[ltId]);

                // Update Transition Class
                ltContainer.classList.remove('type-slide', 'type-fade', 'type-fly');
                ltContainer.classList.add(typeClass);

                // Update Teks & Warna
                const nameEl = document.getElementById(`alt-${i}-name`);
                const infoEl = document.getElementById(`alt-${i}-info`);
                if (nameEl) nameEl.innerHTML = data[`alt_${i}_name`] || "";
                if (infoEl) infoEl.innerHTML = data[`alt_${i}_info`] || "";

                root.style.setProperty(`--alt-${i}-name-color`, data[`alt_${i}_name_color`]);
                root.style.setProperty(`--alt-${i}-info-color`, data[`alt_${i}_info_color`]);
                root.style.setProperty(`--alt-${i}-style-color-1`, data[`alt_${i}_style_color_1`]);
                root.style.setProperty(`--alt-${i}-style-color-2`, data[`alt_${i}_style_color_2`]);
                if (data[`alt_${i}_size`]) root.style.setProperty(`--alt-${i}-size`, data[`alt_${i}_size`] + "px");

                // Layout & Align
                ltContainer.className = `alt ${data[`alt_${i}_align`]} style-${data[`alt_${i}_style`]} ${typeClass}`;

                // LOGIK LOGO (Gabungan Global & Per-LT)
                const logoImg = document.getElementById(`alt-${i}-logo-image`);
                const logoDiv = document.getElementById(`alt-${i}-logo`);
                
                let logoToUse = "//:0";
                let showLogo = false;

                // Cek logo spesifik LT dahulu, jika tiada cek logo global
                if (data[`alt_${i}_logo_switch`] === "true") {
                    if (data[`alt_${i}_logo_image`]) {
                        logoToUse = data[`alt_${i}_logo_image`];
                        showLogo = true;
                    } else if (data.global_logo) {
                        logoToUse = data.global_logo;
                        showLogo = true;
                    }
                }

                if (showLogo) {
                    logoDiv.classList.remove("no-logo");
                    if(logoImg.src !== logoToUse) logoImg.src = logoToUse;
                } else {
                    logoDiv.classList.add("no-logo");
                    logoImg.src = "//:0";
                }

                // LOGIK ANIMASI (Loop vs Manual)
                if (data.global_loop === "true" && data[`alt_${i}_switch`] === "true") {
                    runLoopSystem(i, data.loop_active_dur || 5000, data.loop_idle_dur || 3000);
                } else {
                    if (data[`alt_${i}_switch`] === "true") {
                        animationIn(ltId);
                    } else {
                        animationOut(ltId);
                    }
                }
            }
        };

        // --- 2. MENDENGAR FONT (BCF) ---
        bcf.onmessage = function (ev) {
            if (ev.data && ev.data.new_font_to_send) {
                $('head').append('<style>' + ev.data.new_font_to_send + '</style>');
            }
        };

    </script>
</body>
</html>
