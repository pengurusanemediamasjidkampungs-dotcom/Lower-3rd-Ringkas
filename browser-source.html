<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Thirds Source - Pro Edition (Optimized)</title>
    <!-- Path CSS -->
    <link rel="stylesheet" href="common/css/style-source.css">
    <script src="common/js/jquery.js"></script>
    <style>
        /* Variabel Asas & Transition */
        :root {
            --anim-speed: 0.6s;
            --global-font-size: 18px;
        }

        .animation-in, .animation-out {
            transition: all var(--anim-speed) ease-in-out;
        }

        /* Transition Types Fallback */
        .type-fade.animation-in { opacity: 1; visibility: visible; }
        .type-fade.animation-out { opacity: 0; visibility: hidden; }
        
        .type-slide.animation-in { transform: translateX(0); opacity: 1; visibility: visible; }
        .type-slide.animation-out { transform: translateX(-100%); opacity: 0; visibility: hidden; }

        .type-fly.animation-in { transform: translateY(0); opacity: 1; visibility: visible; }
        .type-fly.animation-out { transform: translateY(50px); opacity: 0; visibility: hidden; }

        /* Sembunyikan elemen secara asal */
        .alt { visibility: hidden; opacity: 0; }
    </style>
</head>
<body class="browser-source lower-thirds">

    <div id="container">
        <!-- Slot 1 -->
        <div id="lower-third-1" class="alt left style-1">
            <div id="alt-1-logo" class="logo no-logo">
                <img id="alt-1-logo-image" src="" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-1-name"></div></div>
                <div class="text-mask"><div id="alt-1-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Slot 2 -->
        <div id="lower-third-2" class="alt left style-1">
            <div id="alt-2-logo" class="logo no-logo">
                <img id="alt-2-logo-image" src="" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-2-name"></div></div>
                <div class="text-mask"><div id="alt-2-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Slot 3 -->
        <div id="lower-third-3" class="alt left style-1">
            <div id="alt-3-logo" class="logo no-logo">
                <img id="alt-3-logo-image" src="" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-3-name"></div></div>
                <div class="text-mask"><div id="alt-3-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>

        <!-- Slot 4 -->
        <div id="lower-third-4" class="alt left style-1">
            <div id="alt-4-logo" class="logo no-logo">
                <img id="alt-4-logo-image" src="" />
            </div>
            <div class="graph-1"></div>
            <div class="text-content">
                <div class="text-mask"><div id="alt-4-name"></div></div>
                <div class="text-mask"><div id="alt-4-info"></div></div>
            </div>
            <div class="graph-2"></div>
        </div>
    </div>

    <script type="text/javascript">
        const bcp = new BroadcastChannel('obs-lower-thirds-channel');
        const bcf = new BroadcastChannel('obs-lower-thirds-fonts');

        let loopTimers = {};

        // Helper untuk animasi
        function showLT(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("animation-out");
            void el.offsetWidth; // Force reflow
            el.classList.add("animation-in");
            el.style.visibility = "visible";
        }

        function hideLT(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("animation-in");
            void el.offsetWidth; // Force reflow
            el.classList.add("animation-out");
        }

        // Fungsi Loop Utama
        function startLoop(index, activeDur, idleDur) {
            const ltId = `lower-third-${index}`;
            
            function run() {
                showLT(ltId);
                loopTimers[ltId] = setTimeout(() => {
                    hideLT(ltId);
                    loopTimers[ltId] = setTimeout(() => {
                        run();
                    }, parseInt(idleDur));
                }, parseInt(activeDur));
            }
            run();
        }

        bcp.onmessage = function (ev) {
            const data = ev.data;
            const root = document.documentElement;

            // Logik Reset
            if (data.action === 'reset') {
                location.reload();
                return;
            }

            // Global Settings
            if (data.anim_speed) root.style.setProperty('--anim-speed', data.anim_speed + "s");
            if (data.font_size) root.style.setProperty('--global-font-size', data.font_size + "px");

            const typeClass = `type-${data.transition_type || 'slide'}`;

            // Loop 1 hingga 4
            for (let i = 1; i <= 4; i++) {
                const ltId = `lower-third-${i}`;
                const ltContainer = document.getElementById(ltId);
                if (!ltContainer) continue;

                // Hentikan timer sedia ada sebelum update
                if (loopTimers[ltId]) {
                    clearTimeout(loopTimers[ltId]);
                    delete loopTimers[ltId];
                }

                // Update Isi Kandungan (Teks)
                document.getElementById(`alt-${i}-name`).innerHTML = data[`alt_${i}_name`] || "";
                document.getElementById(`alt-${i}-info`).innerHTML = data[`alt_${i}_info`] || "";

                // Update Warna & Saiz (CSS Variables)
                root.style.setProperty(`--alt-${i}-name-color`, data[`alt_${i}_name_color`]);
                root.style.setProperty(`--alt-${i}-info-color`, data[`alt_${i}_info_color`]);
                root.style.setProperty(`--alt-${i}-style-color-1`, data[`alt_${i}_style_color_1`]);
                root.style.setProperty(`--alt-${i}-style-color-2`, data[`alt_${i}_style_color_2`]);
                if (data[`alt_${i}_size` ] ) root.style.setProperty(`--alt-${i}-size`, data[`alt_${i}_size`] + "px");

                // Update Layout & Transition Class
                ltContainer.className = `alt ${data[`alt_${i}_align`]} style-${data[`alt_${i}_style`]} ${typeClass}`;

                // Logik Logo
                const logoImg = document.getElementById(`alt-${i}-logo-image`);
                const logoDiv = document.getElementById(`alt-${i}-logo`);
                let logoUrl = "";

                if (data[`alt_${i}_logo_switch`] === "true") {
                    // Keutamaan: Logo Slot > Logo Global
                    logoUrl = data[`alt_${i}_logo_image`] || data.global_logo || "";
                }

                if (logoUrl && logoUrl !== "") {
                    logoImg.src = logoUrl;
                    logoDiv.classList.remove("no-logo");
                } else {
                    logoImg.src = "";
                    logoDiv.classList.add("no-logo");
                }

                // Logik Paparan (Loop vs Manual)
                const isActive = data[`alt_${i}_switch`] === "true";
                const isLoopMode = data.global_loop === "true";

                if (isActive) {
                    if (isLoopMode) {
                        startLoop(i, data.loop_active_dur || 5000, data.loop_idle_dur || 3000);
                    } else {
                        showLT(ltId);
                    }
                } else {
                    hideLT(ltId);
                }
            }
        };

        // Font Dinamik
        bcf.onmessage = function (ev) {
            if (ev.data && ev.data.new_font_to_send) {
                const style = document.createElement('style');
                style.innerHTML = ev.data.new_font_to_send;
                document.head.appendChild(style);
            }
        };
    </script>
</body>
</html>
