<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LT Control Panel - Pro Edition (Updated)</title>
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { padding: 10px; background: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Main Settings Style */
        #main-settings {
            background: #252525;
            padding: 10px;
            border-radius: 5px;
            border-bottom: 2px solid #2196F3;
            margin-bottom: 15px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* Input Styles */
        .input-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
        .input-row input[type="text"], select {
            flex: 1; padding: 6px; background: #111; border: 1px solid #444; color: white; border-radius: 4px; font-size: 11px;
        }
        select { cursor: pointer; }

        /* Logo Slot Styles */
        .logo-upload-container { display: flex; gap: 8px; margin-top: 8px; }
        .logo-upload-slot {
            width: 45px; height: 45px; background: #222; border: 1px dashed #555;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px; overflow: hidden;
        }
        .logo-upload-slot img { width: 100%; height: 100%; object-fit: contain; }
        .mini-preview { width: 24px; height: 24px; background: #222; border: 1px solid #444; margin-right: 5px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
        .mini-preview img { width: 90%; height: 90%; object-fit: contain; }

        /* Button & Switch Styles */
        .btn-tool { width: 28px; height: 24px; background: #444; border: 1px solid #555; color: white; cursor: pointer; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .btn-tool:hover { background: #555; }
        .btn-tool.active { background: #2196F3; border-color: #fff; }
        .color-picker { width: 45px; height: 24px; border: 1px solid #444; background: none; cursor: pointer; border-radius: 3px; padding: 0; }

        .memory-slots { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 5px 0; list-style: none; margin: 0; }
        .memory-slots li { background: #333; color: #888; height: 20px; line-height: 20px; text-align: center; border-radius: 2px; cursor: pointer; font-size: 9px; }
        .memory-slots li.stored { background: #1a3a5a; border: 1px solid #2196F3; color: #fff; }
        .memory-slots li.active { background: #2196F3; color: white; }

        /* Sortees/Section Style */
        .sortees { background: #252525; border: 1px solid #333; border-radius: 5px; margin-bottom: 10px; padding: 10px; transition: 0.3s; border-left: 1px solid #333; }
        .section-body { margin-top: 10px; }

        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Style Baru untuk Font Settings */
        .custom-font-row {
            display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #333;
        }
        .font-input-group { flex: 1; }
        .size-input-group { width: 80px; }
        .custom-font-row label { font-size: 9px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .custom-font-row input[type="number"], .grid-input input {
            width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 3px; font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="alt-panel">
        
        <!-- MAIN SETTINGS -->
        <div id="main-settings">
            <div class="header-row">
                <span>⚙️ MAIN SETTINGS</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-tool" style="width:auto; padding:0 8px;" onclick="$('#customs-panel').slideToggle()">CUSTOMS</button>
                    <label class="switch">
                        <input type="checkbox" id="lower-thirds-masterswitch" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Panel Customs -->
            <div id="customs-panel" style="display:none; background:#1a1a1a; padding:15px; border-radius:4px; margin-top:10px; border:1px solid #333;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label style="font-size:9px; color:#888;">DEFAULT LOGO (PNG)</label>
                    <button onclick="resetSystem()" style="background:#f44336; color:white; border:none; padding:4px 8px; border-radius:3px; font-size:9px; cursor:pointer; font-weight: bold;">RESET ALL DATA</button>
                </div>

                <div class="logo-upload-container">
                    <div class="logo-upload-slot" onclick="document.getElementById('file-global').click()">
                        <img id="preview-global" style="display:none;">
                        <span id="label-global">+</span>
                        <input type="file" id="file-global" hidden accept="image/*" onchange="uploadLogo(this)">
                    </div>
                </div>

                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <!-- Jenis Transition -->
                    <div>
                        <label style="font-size:9px; color:#888;">TRANSITION TYPE</label>
                        <select id="transition-type" onchange="function_send()">
                            <option value="slide">1. Slide In/Out</option>
                            <option value="fade">2. Fade In/Out</option>
                            <option value="fly">3. Fly (Zoom & Slide)</option>
                        </select>
                    </div>

                    <!-- Kelajuan Transition (Global Anim Speed) -->
                    <div class="grid-input">
                        <label style="font-size:9px; color:#888;">SPEED (SECONDS)</label>
                        <input type="number" id="global-anim-speed" value="0.6" step="0.1" min="0.1" max="3" oninput="function_send()">
                    </div>
                </div>

                <div class="custom-font-row">
                    <!-- Muat Naik Font -->
                    <div class="font-input-group">
                        <label>Upload Font (.ttf, .otf)</label>
                        <input type="file" id="font-file" accept=".ttf,.otf,.woff,.woff2" style="font-size:10px; color: #ccc;" onchange="uploadFont(this)">
                        <div id="font-status" style="font-size:9px; color:#4CAF50; margin-top:4px;">No custom font loaded.</div>
                    </div>

                    <!-- Saiz Font Global -->
                    <div class="size-input-group">
                        <label>Global Size</label>
                        <input type="number" id="global-font-size" value="24" min="10" max="100" oninput="function_send()">
                    </div>
                </div>

                <!-- Auto Loop System -->
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <div style="display: flex; gap: 10px; align-items: center; background: #222; padding: 10px; border-radius: 5px;">
                    <div style="flex: 1;">
                        <label style="font-size:9px; color:#888; text-transform:uppercase; display:block; margin-bottom:5px;">Auto Loop System</label>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <label class="switch">
                                <input type="checkbox" id="global-loop-switch" onchange="function_send()">
                                <span class="slider round"></span>
                            </label>
                            <span style="font-size:10px; color:#4CAF50;">AKTIFKAN LOOP</span>
                        </div>
                    </div>
                    
                    <div style="width: 70px;">
                        <label style="font-size:9px; color:#888;">AKTIF (s)</label>
                        <input type="number" id="loop-active-time" value="5" min="1" style="width:100%; background:#000; color:#fff; border:1px solid #444; padding:4px; border-radius:3px;" oninput="function_send()">
                    </div>

                    <div style="width: 70px;">
                        <label style="font-size:9px; color:#888;">REHAT (s)</label>
                        <input type="number" id="loop-idle-time" value="3" min="1" style="width:100%; background:#000; color:#fff; border:1px solid #444; padding:4px; border-radius:3px;" oninput="function_send()">
                    </div>
                </div>
            </div>
        </div>

        <!-- TEMPAT LOWER THIRDS 1-4 -->
        <div id="lt-sections-container"></div>
    </div>

    <!-- TEMPLATE UNTUK SETIAP LOWER THIRD -->
    <template id="lt-section-template">
        <div class="sortees" id="alt-SECTION_ID-config-content">
            <div class="header-row">
                <div style="display: flex; align-items: center;">
                    <button class="btn-tool btn-plus" style="margin-right:8px;">+</button>
                    <span style="color:#2196F3">LOWER THIRD SECTION_ID</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lower-thirds-switchSECTION_ID" class="lt-switch">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="section-body">
                <div class="input-row">
                    <div class="mini-preview"><img class="mini-logo-img" src=""></div>
                    <input type="text" id="alt-SECTION_ID-name" placeholder="Nama / Tajuk Utama">
                    <button type="button" class="btn-tool btn-upper">A</button>
                    <input type="color" id="alt-SECTION_ID-style-color-1" class="color-picker" value="#ffffff">
                </div>

                <div class="input-row">
                    <div style="width:24px; margin-right:5px;"></div>
                    <input type="text" id="alt-SECTION_ID-info" placeholder="Info / Jawatan">
                    <button type="button" class="btn-tool btn-upper">A</button>
                    <input type="color" id="alt-SECTION_ID-style-color-2" class="color-picker" value="#ffff00">
                </div>

                <ul id="alt-SECTION_ID-memory-slots" class="memory-slots"></ul>
            </div>
        </div>
    </template>

    <script>
        const bc = new BroadcastChannel('obs-lower-thirds-channel');

        // 1. Bina UI Automatik
        const container = $('#lt-sections-container');
        const template = $('#lt-section-template').html();

        for (let i = 1; i <= 4; i++) {
            let sectionHtml = template.replace(/SECTION_ID/g, i);
            container.append(sectionHtml);
            let slotList = $(`#alt-${i}-memory-slots`);
            for (let s = 1; s <= 10; s++) {
                slotList.append(`<li id="alt-${i}-slot-${s}">${s}</li>`);
            }
        }

        // 2. FUNGSI RESET SYSTEM
        function resetSystem() {
            if(confirm("Padam semua data logo, teks dan memori?")) {
                localStorage.clear();
                bc.postMessage({ action: 'reset' });
                location.reload();
            }
        }

        // 3. FUNGSI MUAT NAIK FONT
        function uploadFont(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    const fontData = e.target.result;
                    const fileName = input.files[0].name;
                    localStorage.setItem('custom_font_data', fontData);
                    localStorage.setItem('custom_font_name', fileName);
                    $('#font-status').text('Font: ' + fileName + ' (Loaded)');
                    function_send(); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. LOGIK MUAT NAIK LOGO (Dibaiki)
        function uploadLogo(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    localStorage.removeItem('global_logo_data'); // Bersihkan lama
                    localStorage.setItem('global_logo_data', e.target.result);
                    $(`#preview-global`).attr('src', e.target.result).show();
                    $(`#label-global`).hide();
                    updateMiniPreviews();
                    function_send();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateMiniPreviews() {
            let logo = localStorage.getItem('global_logo_data');
            if(logo) $('.mini-logo-img').attr('src', logo);
            else $('.mini-logo-img').attr('src', '');
        }

        // 5. COLLAPSE/EXPAND (+)
        $(document).on('click', '.btn-plus', function() {
            let body = $(this).closest('.sortees').find('.section-body');
            body.slideToggle(200);
            $(this).text($(this).text() === '+' ? '-' : '+');
        });

        // 6. FUNGSI UTAMA HANTAR DATA
        function function_send() {
            let data = {};
            let master = $('#lower-thirds-masterswitch').is(':checked');
            let globalLogo = localStorage.getItem('global_logo_data');
            let customFont = localStorage.getItem('custom_font_data');
            
            // Global Settings
            data[`transition_type`] = $('#transition-type').val();
            data[`anim_speed`] = ($('#global-anim-speed').val() || "0.6") + "s";
            data[`global_logo`] = globalLogo || "";
            
            // Loop Data
            let loopEnabled = $('#global-loop-switch').is(':checked');
            data[`global_loop`] = loopEnabled ? "true" : "false";
            data[`loop_active_dur`] = ($('#loop-active-time').val() || "5") * 1000; 
            data[`loop_idle_dur`] = ($('#loop-idle-time').val() || "3") * 1000;
            
            for(let i=1; i<=4; i++) {
                let sw = $(`#lower-thirds-switch${i}`).is(':checked');
                data[`alt_${i}_switch`] = (master && sw) ? "true" : "false";
                data[`alt_${i}_name`] = $(`#alt-${i}-name`).val();
                data[`alt_${i}_info`] = $(`#alt-${i}-info`).val();
                data[`alt_${i}_name_color`] = $(`#alt-${i}-style-color-1`).val();
                data[`alt_${i}_info_color`] = $(`#alt-${i}-style-color-2`).val();
                data[`alt_${i}_logo_image`] = globalLogo || "";
                data[`alt_${i}_logo_switch`] = globalLogo ? "true" : "false";
            }

            data[`font_data`] = customFont || "";
            data[`font_size`] = ($('#global-font-size').val() || "24") + "px";

            bc.postMessage(data);
            savePanelSettings();
            checkSwitchesVisual();
        }

        function checkSwitchesVisual() {
            let masterOn = $('#lower-thirds-masterswitch').is(':checked');
            for (let i = 1; i <= 4; i++) {
                let sw = $(`#lower-thirds-switch${i}`).is(':checked');
                let config = $(`#alt-${i}-config-content`);
                if (masterOn && sw) config.css('border-left', '5px solid #4CAF50');
                else if (sw) config.css('border-left', '5px solid #FF9800');
                else config.css('border-left', '1px solid #333');
            }
        }

        // 7. MEMORY LOGIC
        $(document).on('mousedown', '[id*=-slot-]', function() {
            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];
            this.isLongPress = false;
            this.timer = setTimeout(() => {
                localStorage.setItem(slotId + '_name', $(`#alt-${altNum}-name`).val());
                localStorage.setItem(slotId + '_info', $(`#alt-${altNum}-info`).val());
                $(this).addClass('stored');
                this.isLongPress = true;
            }, 1000);
        }).on('mouseup mouseleave', '[id*=-slot-]', function() {
            clearTimeout(this.timer);
        }).on('click', '[id*=-slot-]', function() {
            if (this.isLongPress) return;
            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];
            let n = localStorage.getItem(slotId + '_name');
            let f = localStorage.getItem(slotId + '_info');
            if(n !== null) {
                $(`#alt-${altNum}-name`).val(n);
                $(`#alt-${altNum}-info`).val(f);
                $(`[id^=alt-${altNum}-slot-]`).removeClass('active');
                $(this).addClass('active');
                function_send();
            }
        });

        // 8. PERSISTENCE
        function savePanelSettings() {
            $('input, select').each(function() {
                let id = $(this).attr('id');
                if(id && !['font-file', 'file-global'].includes(id)) { 
                    let val = $(this).attr('type') === 'checkbox' ? $(this).is(':checked') : $(this).val();
                    localStorage.setItem("p_" + id, val);
                }
            });
        }

        function loadPanelSettings() {
            $('input, select').each(function() {
                let id = $(this).attr('id');
                let saved = localStorage.getItem("p_" + id);
                if (saved !== null) {
                    if ($(this).attr('type') === 'checkbox') $(this).prop('checked', saved === 'true');
                    else $(this).val(saved);
                }
            });
            
            let savedLogo = localStorage.getItem('global_logo_data');
            if(savedLogo) {
                $(`#preview-global`).attr('src', savedLogo).show();
                $(`#label-global`).hide();
                updateMiniPreviews();
            }

            let savedFontName = localStorage.getItem('custom_font_name');
            if(savedFontName) $('#font-status').text('Font: ' + savedFontName + ' (Loaded)');

            $('[id*=-slot-]').each(function() {
                if (localStorage.getItem($(this).attr('id') + '_name')) $(this).addClass('stored');
            });

            checkSwitchesVisual();
        }

        $(document).ready(function() {
            loadPanelSettings();
            $(document).on('change input', 'input, select', function() { function_send(); });
            $('.btn-upper').click(function() {
                let inp = $(this).siblings('input[type="text"]');
                inp.val(inp.val().toUpperCase());
                function_send();
            });
        });
    </script>
</body>
</html>
