<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LT Control Panel - Manual & Slots</title>
    <!-- Pastikan path CSS ini betul mengikut folder anda -->
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .input-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }
        .input-row input[type="text"] {
            flex: 1;
            padding: 5px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }
        .btn-tool {
            width: 28px;
            height: 28px;
            background: #444;
            border: 1px solid #666;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-tool:hover { background: #555; }
        .btn-tool.active { background: #2196F3; border-color: #fff; }

        .color-picker {
            width: 35px;
            height: 28px;
            border: none;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        .memory-slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 10px 0;
            list-style: none;
        }
        .memory-slots li {
            background: #444;
            color: #fff;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid transparent;
            transition: 0.2s;
            user-select: none; /* Elak text terpilih masa tekan lama */
        }
        .memory-slots li.stored {
            background: #1a3a5a;
            border-color: #2196F3;
        }
        .memory-slots li:active { background: #555; }
    </style>
</head>
<body class="lower-thirds-panel">

    <div id="alt-panel">
        <!-- Master Switch -->
        <div id="alt-main-config-content" style="background: #1a3a5a; margin-bottom: 20px; padding: 10px; border-radius: 5px;">
            <div style="display: flex; align-items: center;">
                <label class="switch">
                    <input type="checkbox" id="lower-thirds-masterswitch">
                    <span class="slider round"></span>
                </label>
                <strong style="margin-left: 15px; color: white;">MASTER SWITCH (AKTIFKAN SEMUA)</strong>
            </div>
        </div>

        <!-- Container untuk 4 Lower Thirds -->
        <div id="lt-sections-container"></div>
    </div>

    <!-- Template Section untuk LT -->
    <template id="lt-section-template">
        <div class="sortees" id="alt-SECTION_ID-config-content" style="border-radius: 5px; margin-bottom: 15px; padding: 10px; border: 1px solid #444; transition: 0.3s;">
            
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div style="display: flex; align-items: center;">
                    <label class="switch">
                        <input type="checkbox" id="lower-thirds-switchSECTION_ID" class="lt-switch">
                        <span class="slider round"></span>
                    </label>
                    <span style="margin-left: 10px; font-weight: bold; color: #ddd;">LOWER THIRD <span class="id-num">SECTION_ID</span></span>
                </div>
            </div>

            <!-- Baris Nama -->
            <div class="input-row">
                <input type="text" id="alt-SECTION_ID-name" placeholder="Nama">
                <button type="button" class="btn-tool btn-upper">A</button>
                <button type="button" class="btn-tool btn-bold">B</button>
                <!-- ID diselaraskan dengan function_send -->
                <input type="color" id="alt-SECTION_ID-style-color-1" class="color-picker" value="#ffffff">
            </div>

            <!-- Baris Info -->
            <div class="input-row">
                <input type="text" id="alt-SECTION_ID-info" placeholder="Info">
                <button type="button" class="btn-tool btn-upper">A</button>
                <button type="button" class="btn-tool btn-bold">B</button>
                <!-- ID diselaraskan dengan function_send -->
                <input type="color" id="alt-SECTION_ID-style-color-2" class="color-picker" value="#cccccc">
            </div>

            <!-- Slot Memori -->
            <div style="margin-top: 10px;">
                <label style="font-size: 10px; color: #888; text-transform: uppercase;">Memory Slots (Tahan 1s Simpan / Klik Load)</label>
                <ul id="alt-SECTION_ID-memory-slots" class="memory-slots"></ul>
            </div>
        </div>
    </template>

    <script>
        // 1. Inisialisasi BroadcastChannel
        const bc = new BroadcastChannel('lower_thirds_channel');

        // 2. Bina UI 4 Section secara automatik
        const container = $('#lt-sections-container');
        const template = $('#lt-section-template').html();

        for (let i = 1; i <= 4; i++) {
            let sectionHtml = template.replace(/SECTION_ID/g, i);
            container.append(sectionHtml);

            // Tambah 10 slot memori bagi setiap section
            let slotList = $(`#alt-${i}-memory-slots`);
            for (let s = 1; s <= 10; s++) {
                slotList.append(`<li id="alt-${i}-slot-${s}">${s}</li>`);
            }
        }

        // 3. Fungsi Utama: Hantar Data ke OBS
        function function_send() {
            let data = {};
            let master = $('#lower-thirds-masterswitch').is(':checked');
            
            for(let i=1; i<=4; i++) {
                let sw = $('#lower-thirds-switch' + i).is(':checked');
                data[`alt_${i}_switch`] = (master && sw) ? "true" : "false";
                data[`alt_${i}_name`] = $(`#alt-${i}-name`).val();
                data[`alt_${i}_info`] = $(`#alt-${i}-info`).val();
                data[`alt_${i}_style_color_1`] = $(`#alt-${i}-style-color-1`).val();
                data[`alt_${i}_style_color_2`] = $(`#alt-${i}-style-color-2`).val();
                data[`alt_${i}_align`] = "left";
                data[`alt_${i}_style`] = "1";
            }
            bc.postMessage(data);
            checkSwitchesVisual(); // Update warna border
            savePanelSettings();   // Simpan keadaan panel (teks/suis)
        }

        // Visual feedback untuk border section
        function checkSwitchesVisual() {
            let masterOn = $('#lower-thirds-masterswitch').is(':checked');
            for (let i = 1; i <= 4; i++) {
                let sw = $(`#lower-thirds-switch${i}`).is(':checked');
                let config = $(`#alt-${i}-config-content`);
                if (masterOn && sw) {
                    config.css('border-left', '5px solid #00ff00'); // Hijau (Aktif)
                } else if (sw) {
                    config.css('border-left', '5px solid #ffaa00'); // Jingga (Standby)
                } else {
                    config.css('border-left', '1px solid #444');    // Biasa
                }
            }
        }

        // 4. Logik Slot - Klik untuk Load, Tahan 1 saat untuk Save
        $(document).on('mousedown', '[id*=-slot-]', function() {
            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];
            this.isLongPress = false;

            this.longClickTimer = setTimeout(() => {
                let name = $(`#alt-${altNum}-name`).val();
                let info = $(`#alt-${altNum}-info`).val();
                if(name) {
                    localStorage.setItem(slotId + '_name', name);
                    localStorage.setItem(slotId + '_info', info);
                    $(this).addClass('stored');
                    this.isLongPress = true;
                    alert("Data Slot " + slotId.split('-').pop() + " Disimpan!");
                }
            }, 1000);
        }).on('mouseup mouseleave', '[id*=-slot-]', function() {
            clearTimeout(this.longClickTimer);
        }).on('click', '[id*=-slot-]', function() {
            if (this.isLongPress) return; // Jika baru lepas simpan, jangan load

            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];
            let n = localStorage.getItem(slotId + '_name');
            let f = localStorage.getItem(slotId + '_info');
            
            if(n) {
                $(`#alt-${altNum}-name`).val(n);
                $(`#alt-${altNum}-info`).val(f);
                function_send(); // Terus update ke OBS secara manual
            }
        });

        // 5. Simpan & Muat Tetapan Panel (Auto-save)
        function savePanelSettings() {
            $('input').each(function() {
                let id = $(this).attr('id');
                if (id) {
                    let val = $(this).attr('type') === 'checkbox' ? $(this).is(':checked') : $(this).val();
                    localStorage.setItem("panel_" + id, val);
                }
            });
        }

        function loadPanelSettings() {
            $('input').each(function() {
                let id = $(this).attr('id');
                let saved = localStorage.getItem("panel_" + id);
                if (saved !== null) {
                    if ($(this).attr('type') === 'checkbox') {
                        $(this).prop('checked', saved === 'true');
                    } else {
                        $(this).val(saved);
                    }
                }
            });
            refreshSlotUI();
            checkSwitchesVisual();
        }

        function refreshSlotUI() {
            $('[id*=-slot-]').each(function() {
                if (localStorage.getItem($(this).attr('id') + '_name')) {
                    $(this).addClass('stored');
                }
            });
        }

        // Event Listener untuk input & switch
        $(document).ready(function() {
            loadPanelSettings();

            $(document).on('change input', 'input', function() {
                function_send();
            });

            $('.btn-tool').click(function() {
                $(this).toggleClass('active');
            });
        });
    </script>
</body>
</html>
