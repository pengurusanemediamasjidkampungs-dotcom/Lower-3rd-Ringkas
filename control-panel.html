<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LT Control Panel - Manual & Slots</title>
    <!-- Pastikan path CSS ini betul mengikut struktur folder anda -->
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <script src="common/js/jquery.js"></script>
    <style>
        /* Tambahan CSS ringkas untuk Slot */
        .memory-slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 10px 0;
            list-style: none;
        }
        .memory-slots li {
            background: #444;
            color: #fff;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .memory-slots li.stored {
            background: #1a3a5a;
            border-color: #2196F3;
        }
        .memory-slots li:active { background: #555; }
        .stored-name { display: none; } /* Simpan data secara hidden */
    </style>
</head>
<body class="lower-thirds-panel">

    <div id="alt-panel">
        <!-- Master Switch Section -->
        <div id="alt-main-config-content" class="sortees" style="background: #1a3a5a; margin-bottom: 20px;">
            <div style="display: flex; align-items: center;">
                <label class="switch">
                    <input type="checkbox" id="lower-thirds-masterswitch" class="checkbox-storable">
                    <span class="slider round"></span>
                </label>
                <strong style="margin-left: 15px; color: white;">MASTER SWITCH (AKTIFKAN SEMUA)</strong>
            </div>
        </div>

        <!-- Container untuk 4 Lower Thirds -->
        <div id="lt-sections-container"></div>
    </div>

    <!-- Template Section untuk LT -->
    <template id="lt-section-template">
        <div class="sortees" id="alt-SECTION_ID-config-content">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div style="display: flex; align-items: center;">
                    <label class="switch">
                        <input type="checkbox" id="lower-thirds-switchSECTION_ID" class="checkbox-storable">
                        <span class="slider round"></span>
                    </label>
                    <span style="margin-left: 10px; font-weight: bold;">LOWER THIRD SECTION_ID</span>
                </div>
                <div class="drag-handle">:::</div>
            </div>

            <!-- Inputs Utama -->
            <div class="input-group">
                <input type="text" id="alt-SECTION_ID-name" class="storable" placeholder="Nama Utama">
                <input type="text" id="alt-SECTION_ID-info" class="storable" placeholder="Info Tambahan">
            </div>

            <!-- Tetapan Visual -->
            <div class="grid-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <div>
                    <label>Style:</label>
                    <select id="alt-SECTION_ID-style" class="storable" style="width: 100%;">
                        <option value="1">Style 1 (Standard)</option>
                        <option value="2">Style 2 (Modern)</option>
                        <option value="3">Style 3 (Minimal)</option>
                    </select>
                </div>
                <div>
                    <label>Alignment:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="radio" name="alt-SECTION_ID-align" id="alt-SECTION_ID-align-left" value="left" checked class="radio-storable"> L
                        <input type="radio" name="alt-SECTION_ID-align" id="alt-SECTION_ID-align-center" value="center" class="radio-storable"> C
                        <input type="radio" name="alt-SECTION_ID-align" id="alt-SECTION_ID-align-right" value="right" class="radio-storable"> R
                    </div>
                </div>
            </div>

            <!-- Warna & Saiz -->
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px;">
                <input type="color" id="alt-SECTION_ID-style-color-1" class="storable" value="#d54141" title="Warna Tema">
                <input type="color" id="alt-SECTION_ID-style-color-2" class="storable" value="#222222" title="Warna Background">
                <input type="number" id="alt-SECTION_ID-size" class="storable" value="24" title="Saiz Font">
            </div>

            <!-- Logo Switch & Preview -->
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                <label><input type="checkbox" id="alt-SECTION_ID-logo" class="checkbox-storable"> Guna Logo</label>
                <img id="alt-SECTION_ID-logo-preview" src="../logos/logo_1.png" style="height: 30px; display: none;">
            </div>

            <hr style="border: 0.5px solid #444; margin: 15px 0;">

            <!-- Slot Memori 1-10 -->
            <label style="font-size: 11px; color: #aaa;">MEMORY SLOTS (Klik: Muat | Tahan 1s: Simpan)</label>
            <ul id="alt-SECTION_ID-memory-slots" class="memory-slots">
                <!-- Slot akan dibina oleh JS -->
            </ul>
        </div>
    </template>

    <script>
        // --- KONFIGURASI ASAS ---
        var bc = new BroadcastChannel('obs-lower-thirds-channel');
        var bcf = new BroadcastChannel('obs-lower-thirds-fonts');

        // --- BINA UI SECARA DINAMIK (4 SECTIONS) ---
        const container = $('#lt-sections-container');
        const template = $('#lt-section-template').html();

        for (let i = 1; i <= 4; i++) {
            let sectionHtml = template.replace(/SECTION_ID/g, i);
            container.append(sectionHtml);

            // Bina 10 Slot untuk setiap section
            let slotList = $(`#alt-${i}-memory-slots`);
            for (let s = 1; s <= 10; s++) {
                slotList.append(`<li id="alt-${i}-slot-${s}">Slot ${s}<div class="stored-name"></div></li>`);
            }
        }

        // --- 1. FUNGSI PENGHANTARAN DATA (MANUAL) ---
        function function_send() {
            let dataToSend = {};
            let masterOn = document.getElementById("lower-thirds-masterswitch").checked;

            for (let i = 1; i <= 4; i++) {
                let isSwitchOn = document.getElementById(`lower-thirds-switch${i}`).checked;
                
                dataToSend[`alt_${i}_switch`] = (masterOn && isSwitchOn) ? "true" : "false";
                dataToSend[`alt_${i}_name`] = $(`#alt-${i}-name`).val();
                dataToSend[`alt_${i}_info`] = $(`#alt-${i}-info`).val();
                dataToSend[`alt_${i}_style`] = $(`#alt-${i}-style`).val();
                dataToSend[`alt_${i}_align`] = $(`input[name=alt-${i}-align]:checked`).val();
                dataToSend[`alt_${i}_size`] = $(`#alt-${i}-size`).val();
                dataToSend[`alt_${i}_name_color`] = "#ffffff"; // Default putih
                dataToSend[`alt_${i}_info_color`] = "#cccccc"; // Default kelabu
                dataToSend[`alt_${i}_style_color_1`] = $(`#alt-${i}-style-color-1`).val();
                dataToSend[`alt_${i}_style_color_2`] = $(`#alt-${i}-style-color-2`).val();
                dataToSend[`alt_${i}_logo_switch`] = document.getElementById(`alt-${i}-logo`).checked ? "true" : "false";
                dataToSend[`alt_${i}_logo_image`] = $(`#alt-${i}-logo-preview`).attr("src");
            }

            bc.postMessage(dataToSend);
            checkSwitches();
            saveCurrentSettings(); 
        }

        // --- 2. FUNGSI KAWALAN UI SWITCH ---
        function checkSwitches() {
            let masterOn = document.getElementById("lower-thirds-masterswitch").checked;
            
            for (let i = 1; i <= 4; i++) {
                let sw = document.getElementById(`lower-thirds-switch${i}`);
                let config = document.getElementById(`alt-${i}-config-content`);
                
                if (masterOn && sw.checked) {
                    config.style.borderLeft = "5px solid #00ff00"; // Hijau jika ON
                } else if (sw.checked) {
                    config.style.borderLeft = "5px solid #ffaa00"; // Jingga jika standby (Master OFF)
                } else {
                    config.style.borderLeft = "1px solid #444";
                }
            }
        }

        // --- 3. SISTEM MEMORY SLOT (SIMPAN & MUAT) ---
        function saveToSlot(slotId, name, info, logo) {
            localStorage.setItem(slotId + "_name", name);
            localStorage.setItem(slotId + "_info", info);
            localStorage.setItem(slotId + "_logo", logo);
            refreshSlotUI(); 
        }

        function loadFromSlot(slotId) {
            const savedName = localStorage.getItem(slotId + "_name");
            const savedInfo = localStorage.getItem(slotId + "_info");
            const savedLogo = localStorage.getItem(slotId + "_logo");

            if (savedName !== null) {
                let altNum = slotId.split('-')[1]; 
                $(`#alt-${altNum}-name`).val(savedName);
                $(`#alt-${altNum}-info`).val(savedInfo);
                if(savedLogo && savedLogo !== "undefined") {
                    $(`#alt-${altNum}-logo-preview`).attr("src", savedLogo);
                }
                function_send(); 
            }
        }

        function refreshSlotUI() {
            $("[id^=alt-][id*=-slot-]").each(function() {
                let slotId = $(this).attr('id');
                if (localStorage.getItem(slotId + "_name")) {
                    $(this).addClass("stored");
                    let name = localStorage.getItem(slotId + "_name");
                    $(this).find(".stored-name").text(name);
                } else {
                    $(this).removeClass("stored");
                }
            });
        }

        // --- 4. LOGIK KLIK SLOT (MUAT & TEKAN LAMA UNTUK SIMPAN) ---
        $(document).on('mousedown', "[id^=alt-][id*=-slot-]", function(e) {
            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];

            this.isLongPress = false;
            this.downTimer = setTimeout(() => {
                let currentName = $(`#alt-${altNum}-name`).val();
                let currentInfo = $(`#alt-${altNum}-info`).val();
                let currentLogo = $(`#alt-${altNum}-logo-preview`).attr("src");

                if(currentName.trim() !== "") {
                    saveToSlot(slotId, currentName, currentInfo, currentLogo);
                    alert("Disimpan!");
                }
                this.isLongPress = true;
            }, 1000); 
        }).on('mouseup mouseleave', "[id^=alt-][id*=-slot-]", function() {
            clearTimeout(this.downTimer);
        }).on('click', "[id^=alt-][id*=-slot-]", function() {
            if (!this.isLongPress) {
                loadFromSlot($(this).attr('id'));
            }
        });

        // --- 5. PENGURUSAN DATA SEMASA (TETAPAN PANEL) ---
        function saveCurrentSettings() {
            $('input, select').each(function() {
                let id = $(this).attr('id');
                if (!id) return;
                if ($(this).attr('type') === 'checkbox') {
                    localStorage.setItem("settings_" + id, $(this).is(':checked'));
                } else if ($(this).attr('type') === 'radio') {
                    if($(this).is(':checked')) localStorage.setItem("settings_" + $(this).attr('name'), $(this).val());
                } else {
                    localStorage.setItem("settings_" + id, $(this).val());
                }
            });
        }

        function loadCurrentSettings() {
            $('input, select').each(function() {
                let id = $(this).attr('id');
                if (!id) return;
                let savedVal = localStorage.getItem("settings_" + id);
                
                if (savedVal !== null) {
                    if ($(this).attr('type') === 'checkbox') {
                        $(this).prop('checked', savedVal === 'true');
                    } else {
                        $(this).val(savedVal);
                    }
                }
            });
            
            // Load Radio Buttons
            for(let i=1; i<=4; i++) {
                let radioVal = localStorage.getItem(`settings_alt-${i}-align`);
                if(radioVal) $(`input[name=alt-${i}-align][value=${radioVal}]`).prop('checked', true);
            }

            refreshSlotUI();
            checkSwitches();
        }

        // --- 6. EVENT LISTENERS ---
        $(document).ready(function() {
            loadCurrentSettings();

            // Kirim data setiap kali ada perubahan input
            $(document).on('change input', 'input, select', function() {
                function_send();
            });
        });
    </script>
</body>
</html>
