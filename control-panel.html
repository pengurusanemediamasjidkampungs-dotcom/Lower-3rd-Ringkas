<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LT Control Panel - Manual & Slots</title>
    <link rel="stylesheet" href="common/css/style-control_panel.css">
    <script src="common/js/jquery.js"></script>
    <style>
        /* Tambahan CSS untuk susunan baru */
        .input-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
        }
        .input-row input[type="text"] {
            flex: 1;
            padding: 5px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }
        .btn-tool {
            width: 28px;
            height: 28px;
            background: #444;
            border: 1px solid #666;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-tool:hover { background: #555; }
        .btn-tool.active { background: #2196F3; border-color: #fff; }

        .color-picker {
            width: 35px;
            height: 28px;
            border: none;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        .memory-slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            padding: 10px 0;
            list-style: none;
        }
        .memory-slots li {
            background: #444;
            color: #fff;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .memory-slots li.stored {
            background: #1a3a5a;
            border-color: #2196F3;
        }
        .memory-slots li:active { background: #555; }
        .stored-name { display: none; }
    </style>
</head>
<body class="lower-thirds-panel">

    <div id="alt-panel">
        <!-- Master Switch -->
        <div id="alt-main-config-content" class="sortees" style="background: #1a3a5a; margin-bottom: 20px; padding: 10px; border-radius: 5px;">
            <div style="display: flex; align-items: center;">
                <label class="switch">
                    <input type="checkbox" id="lower-thirds-masterswitch" class="checkbox-storable">
                    <span class="slider round"></span>
                </label>
                <strong style="margin-left: 15px; color: white;">MASTER SWITCH (AKTIFKAN SEMUA)</strong>
            </div>
        </div>

        <!-- Container untuk 4 Lower Thirds -->
        <div id="lt-sections-container"></div>
    </div>

    <!-- Template Section untuk LT (SUSUNAN BARU) -->
    <template id="lt-section-template">
        <div class="sortees" id="alt-SECTION_ID-config-content" style="border-radius: 5px; margin-bottom: 15px; padding: 10px; border: 1px solid #444;">
            
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div style="display: flex; align-items: center;">
                    <label class="switch">
                        <input type="checkbox" id="lower-thirds-switchSECTION_ID" class="checkbox-storable lt-switch">
                        <span class="slider round"></span>
                    </label>
                    <span style="margin-left: 10px; font-weight: bold; color: #ddd;">LOWER THIRD <span class="id-num">SECTION_ID</span></span>
                </div>
                <div class="drag-handle" style="cursor: grab; color: #666;">:::</div>
            </div>

            <!-- Baris Nama: Input -> A -> B -> Color -->
            <div class="input-row">
                <input type="text" id="alt-SECTION_ID-name" class="storable" placeholder="Nama">
                <button type="button" class="btn-tool btn-upper" title="Uppercase">A</button>
                <button type="button" class="btn-tool btn-bold" title="Bold">B</button>
                <input type="color" id="alt-SECTION_ID-name-color" class="storable color-picker" value="#ffffff">
            </div>

            <!-- Baris Info: Input -> A -> B -> Color -->
            <div class="input-row">
                <input type="text" id="alt-SECTION_ID-info" class="storable" placeholder="Info">
                <button type="button" class="btn-tool btn-upper" title="Uppercase">A</button>
                <button type="button" class="btn-tool btn-bold" title="Bold">B</button>
                <input type="color" id="alt-SECTION_ID-info-color" class="storable color-picker" value="#cccccc">
            </div>

            <!-- Slot Memori -->
            <div style="margin-top: 10px;">
                <label style="font-size: 10px; color: #888; text-transform: uppercase;">Memory Slots</label>
                <ul id="alt-SECTION_ID-memory-slots" class="memory-slots"></ul>
            </div>
        </div>
    </template>

    <script>
        var bc = new BroadcastChannel('obs-lower-thirds-channel');

        // Bina UI 4 Section
        const container = $('#lt-sections-container');
        const template = $('#lt-section-template').html();

        for (let i = 1; i <= 4; i++) {
            let sectionHtml = template.replace(/SECTION_ID/g, i);
            container.append(sectionHtml);

            let slotList = $(`#alt-${i}-memory-slots`);
            for (let s = 1; s <= 10; s++) {
                slotList.append(`<li id="alt-${i}-slot-${s}">${s}<div class="stored-name"></div></li>`);
            }
        }

        // Fungsi Hantar Data
        function function_send() {
            let dataToSend = {};
            let masterOn = document.getElementById("lower-thirds-masterswitch").checked;

            for (let i = 1; i <= 4; i++) {
                let isSwitchOn = document.getElementById(`lower-thirds-switch${i}`).checked;
                
                dataToSend[`alt_${i}_switch`] = (masterOn && isSwitchOn) ? "true" : "false";
                dataToSend[`alt_${i}_name`] = $(`#alt-${i}-name`).val();
                dataToSend[`alt_${i}_info`] = $(`#alt-${i}-info`).val();
                dataToSend[`alt_${i}_name_color`] = $(`#alt-${i}-name-color`).val();
                dataToSend[`alt_${i}_info_color`] = $(`#alt-${i}-info-color`).val();
                
                // Tambahan: Logik untuk Uppercase/Bold boleh ditambah di sini jika perlu hantar ke overlay
            }

            bc.postMessage(dataToSend);
            checkSwitches();
            saveCurrentSettings(); 
        }

        function checkSwitches() {
            let masterOn = document.getElementById("lower-thirds-masterswitch").checked;
            for (let i = 1; i <= 4; i++) {
                let sw = document.getElementById(`lower-thirds-switch${i}`);
                let config = document.getElementById(`alt-${i}-config-content`);
                if (masterOn && sw.checked) {
                    config.style.borderLeft = "5px solid #00ff00";
                } else if (sw.checked) {
                    config.style.borderLeft = "5px solid #ffaa00";
                } else {
                    config.style.borderLeft = "1px solid #444";
                }
            }
        }

        // Memory Slot Logic (Ringkas)
        function saveToSlot(slotId, name, info) {
            localStorage.setItem(slotId + "_name", name);
            localStorage.setItem(slotId + "_info", info);
            refreshSlotUI(); 
        }

        function loadFromSlot(slotId) {
            const savedName = localStorage.getItem(slotId + "_name");
            const savedInfo = localStorage.getItem(slotId + "_info");
            if (savedName !== null) {
                let altNum = slotId.split('-')[1]; 
                $(`#alt-${altNum}-name`).val(savedName);
                $(`#alt-${altNum}-info`).val(savedInfo);
                function_send(); 
            }
        }

        function refreshSlotUI() {
            $("[id^=alt-][id*=-slot-]").each(function() {
                let slotId = $(this).attr('id');
                if (localStorage.getItem(slotId + "_name")) {
                    $(this).addClass("stored");
                } else {
                    $(this).removeClass("stored");
                }
            });
        }

        // Event Click Slots
        $(document).on('mousedown', "[id^=alt-][id*=-slot-]", function(e) {
            let slotId = $(this).attr('id');
            let altNum = slotId.split('-')[1];
            this.downTimer = setTimeout(() => {
                saveToSlot(slotId, $(`#alt-${altNum}-name`).val(), $(`#alt-${altNum}-info`).val());
                this.isLongPress = true;
            }, 1000); 
        }).on('mouseup mouseleave', "[id^=alt-][id*=-slot-]", function() {
            clearTimeout(this.downTimer);
        }).on('click', "[id^=alt-][id*=-slot-]", function() {
            if (!this.isLongPress) loadFromSlot($(this).attr('id'));
            this.isLongPress = false;
        });

        // Simpan & Muat Tetapan Panel
        function saveCurrentSettings() {
            $('input').each(function() {
                let id = $(this).attr('id');
                if (!id) return;
                localStorage.setItem("settings_" + id, $(this).attr('type') === 'checkbox' ? $(this).is(':checked') : $(this).val());
            });
        }

        function loadCurrentSettings() {
            $('input').each(function() {
                let id = $(this).attr('id');
                let savedVal = localStorage.getItem("settings_" + id);
                if (savedVal !== null) {
                    if ($(this).attr('type') === 'checkbox') $(this).prop('checked', savedVal === 'true');
                    else $(this).val(savedVal);
                }
            });
            refreshSlotUI();
            checkSwitches();
        }

        $(document).ready(function() {
            loadCurrentSettings();
            $(document).on('change input', 'input', function() {
                function_send();
            });

            // Toggle Button Visual
            $('.btn-tool').click(function() {
                $(this).toggleClass('active');
            });
        });
    </script>
</body>
</html>
